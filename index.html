    const tags = document.createElement('div');
    tags.className = 'repo-tags';
    (repertoire[key] || []).forEach((item, idx) => {
      const tag = document.createElement('div');
      tag.className = 'repo-tag';
      tag.innerHTML = `<span>${item}</span><button class="del-btn" onclick="deleteRepo('${key}',${idx})">Ã—</button>`;
      tags.appendChild(tag);
    });
    sec.appendChild(tags);
    const form = document.createElement('div');
    form.className = 'add-repo-form';
    form.innerHTML = `
      <input type="text" id="new-repo-${key}" placeholder="æ–°ã—ã„ãƒ¡ãƒ‹ãƒ¥ãƒ¼ã‚’è¿½åŠ " />
      <button onclick="addRepo('${key}')">è¿½åŠ </button>
    `;
    sec.appendChild(form);
    container.appendChild(sec);
  });
}

function addRepo(key) {
  const input = document.getElementById(`new-repo-${key}`);
  const val = input.value.trim();
  if (!val) return;
  if (!repertoire[key]) repertoire[key] = [];
  if (repertoire[key].includes(val)) { alert('ã™ã§ã«ç™»éŒ²ã•ã‚Œã¦ã„ã¾ã™'); return; }
  repertoire[key].push(val);
  input.value = '';
  saveAll();
  renderRepertoire();
}

function deleteRepo(key, idx) {
  if (!confirm(`ã€Œ${repertoire[key][idx]}ã€ã‚’å‰Šé™¤ã—ã¾ã™ã‹ï¼Ÿ`)) return;
  repertoire[key].splice(idx, 1);
  saveAll();
  renderRepertoire();
}

// ===== ã‚¯ãƒƒã‚¯ãƒ‘ãƒƒãƒ‰ =====
function searchCookpad() {
  const q = document.getElementById('cookpad-input').value.trim();
  if (!q) return;
  const url = `https://cookpad.com/search/${encodeURIComponent(q)}`;
  window.open(url, '_blank');
}

function renderQuickRecipeBtns() {
  const container = document.getElementById('quick-recipe-btns');
  container.innerHTML = '';
  const allDishes = [];
  Object.values(repertoire).forEach(arr => allDishes.push(...arr));
  // ã‚ˆãä½¿ã†æ–™ç†ä¸Šä½è¡¨ç¤ºï¼ˆé‡è¤‡é™¤åŽ»ï¼‰
  [...new Set(allDishes)].slice(0, 24).forEach(dish => {
    const btn = document.createElement('button');
    btn.style.cssText = 'padding:5px 10px;background:#fff3eb;border:1.5px solid #ffd6b3;border-radius:20px;font-size:0.78rem;cursor:pointer;color:#333;';
    btn.textContent = dish;
    btn.onclick = () => {
      document.getElementById('cookpad-input').value = dish;
      searchCookpad();
    };
    container.appendChild(btn);
  });
}

// ===== é€±ç§»å‹• =====
function changeWeek(dir) {
  currentWeekOffset += dir;
  renderCalendar();
}

function goToThisWeek() {
  currentWeekOffset = 0;
  renderCalendar();
}

// ===== ã‚¿ãƒ–åˆ‡ã‚Šæ›¿ãˆ =====
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  const navBtn = document.getElementById(`nav-${name}`);
  if (navBtn) navBtn.classList.add('active');
  if (name === 'shopping') generateShoppingList();
  if (name === 'repertoire') renderRepertoire();
  if (name === 'cookpad') renderQuickRecipeBtns();
}

// ===== ä¿å­˜ =====
function saveAll() {
  localStorage.setItem('repertoire', JSON.stringify(repertoire));
  localStorage.setItem('nightDays', JSON.stringify(nightDays));
  localStorage.setItem('weekMenus', JSON.stringify(weekMenus));
}
